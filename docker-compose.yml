# Optional: a Postgres instance for when you graduate from the SQLite dev database.
# Start it with:  docker compose up -d
# Then set DATABASE_URL in server/.env to:
#   postgresql://vela:vela@localhost:5432/vela
# and change the datasource provider in server/prisma/schema.prisma to "postgresql".
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vela
      POSTGRES_PASSWORD: vela
      POSTGRES_DB: vela
    ports:
      - "5432:5432"
    volumes:
      - vela_pgdata:/var/lib/postgresql/data

volumes:
  vela_pgdata:
